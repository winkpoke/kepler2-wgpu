<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <style>
    .box { fill: #f7f9fc; stroke: #2b6cb0; stroke-width:2; rx:8; }
    .small { fill: #fff; stroke: #4a5568; stroke-width:1; rx:6; }
    .title { font: 700 14px/1 'Segoe UI', Roboto, sans-serif; fill: #0b3b66; }
    .label { font: 400 12px/1 'Segoe UI', Roboto, sans-serif; fill: #14213d; }
    .muted { font: 400 11px/1 'Segoe UI', Roboto, sans-serif; fill: #3a4958; }
    .arrow { stroke: #2b6cb0; stroke-width:2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray:6 4; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2b6cb0" />
    </marker>
  </defs>

  <!-- Layout & Views -->
  <rect class="box" x="20" y="20" width="320" height="160" />
  <text x="35" y="46" class="title">Layout</text>
  <text x="35" y="68" class="label">- chooses visible views</text>
  <text x="35" y="90" class="label">- provides ordering</text>

  <rect class="small" x="30" y="110" width="140" height="60" />
  <text x="40" y="132" class="label">View Trait</text>
  <text x="40" y="148" class="muted">→ produces DrawList</text>

  <rect class="small" x="180" y="110" width="140" height="60" />
  <text x="190" y="132" class="label">DrawList</text>
  <text x="190" y="148" class="muted">Contains DrawItems</text>

  <!-- RenderContext -->
  <rect class="box" x="20" y="200" width="320" height="120" />
  <text x="35" y="226" class="title">RenderContext / MeshRenderContext</text>
  <text x="35" y="248" class="label">- translates DrawList into submissions</text>
  <text x="35" y="268" class="label">- prepares per-view uniforms, bindgroups</text>

  <!-- RenderApp / PassPlan -->
  <rect class="box" x="420" y="20" width="320" height="120" />
  <text x="435" y="44" class="title">RenderApp</text>
  <text x="435" y="66" class="label">- builds PassPlan</text>
  <text x="435" y="88" class="label">- orchestrates submission</text>

  <rect class="small" x="470" y="110" width="220" height="40" />
  <text x="480" y="136" class="label">PassPlan (per-frame)</text>

  <!-- PassRegistry -->
  <rect class="box" x="420" y="160" width="320" height="120" />
  <text x="435" y="186" class="title">PassRegistry</text>
  <text x="435" y="208" class="label">- pass descriptors &amp; ordering</text>
  <text x="435" y="228" class="label">- builds default plans</text>

  <!-- PassGraph / Pass Nodes -->
  <rect class="box" x="820" y="20" width="340" height="260" />
  <text x="835" y="44" class="title">PassGraph / Pass Nodes</text>
  <rect class="small" x="840" y="70" width="150" height="60" />
  <text x="850" y="92" class="label">OffscreenPassNode</text>
  <text x="850" y="108" class="muted">- MeshPass (depth)</text>

  <rect class="small" x="1000" y="70" width="150" height="60" />
  <text x="1010" y="92" class="label">OnscreenPassNode</text>
  <text x="1010" y="108" class="muted">- SlicePass / Overlay</text>

  <rect class="small" x="840" y="150" width="310" height="60" />
  <text x="850" y="172" class="label">Pass Submissions</text>
  <text x="850" y="190" class="muted">Group by PipelineId → encode</text>

  <!-- PipelineManager -->
  <rect class="box" x="420" y="300" width="320" height="140" />
  <text x="435" y="328" class="title">PipelineManager</text>
  <text x="435" y="350" class="label">- creates &amp; caches Pipelines</text>
  <text x="435" y="370" class="label">- keyed by PipelineDescriptor</text>

  <rect class="small" x="470" y="332" width="220" height="36" />
  <text x="480" y="356" class="label">PipelineDescriptor → Pipeline</text>

  <!-- ResourceManager -->
  <rect class="box" x="420" y="460" width="740" height="220" />
  <text x="435" y="488" class="title">ResourceManager</text>
  <text x="435" y="510" class="label">- TexturePool | BufferArena | BindGroupCache</text>
  <rect class="small" x="460" y="532" width="200" height="48" />
  <text x="472" y="558" class="label">TexturePool</text>
  <rect class="small" x="700" y="532" width="200" height="48" />
  <text x="712" y="558" class="label">BufferArena</text>
  <rect class="small" x="940" y="532" width="200" height="48" />
  <text x="952" y="558" class="label">BindGroupCache</text>
  <text x="460" y="590" class="muted">- frame-local allocators, staging uploads, reuse</text>

  <!-- Arrows -->
  <path class="arrow" d="M340 100 L400 100 L400 80" />
  <text x="352" y="94" class="muted">DrawLists</text>

  <path class="arrow" d="M170 170 L170 200" />
  <path class="arrow" d="M250 170 L250 200" />
  <path class="arrow" d="M200 170 L200 240" />
  <path class="arrow" d="M340 260 L420 260 L420 200" />
  <text x="360" y="254" class="muted">Per-view submissions</text>
  <path class="arrow" d="M560 160 L720 160" />
  <path class="arrow" d="M550 130 L680 130 L820 120" />
  <text x="600" y="120" class="muted">PassPlan (frame)</text>
  <path class="arrow" d="M930 220 L760 220 L760 300" />
  <text x="820" y="234" class="muted">uses PipelineId</text>
  <path class="arrow" d="M580 380 L580 460" />
  <text x="590" y="420" class="muted">requests texture/buffer layouts</text>
  <path class="arrow dashed" d="M950 200 L950 460" />
  <text x="792" y="336" class="muted">allocate attachments (depth/color)</text>

  <!-- Submission Note -->
  <rect x="20" y="700" width="320" height="80" rx="8" fill="#fff3e0" stroke="#b45309" stroke-width="2"/>
  <text x="35" y="726" class="title" style="fill:#92400e">Frame Encoding &amp; Submission</text>
  <text x="35" y="748" class="muted" style="fill:#7c2d12">- encode passes in PassPlan order</text>
  <text x="35" y="766" class="muted" style="fill:#7c2d12">- submit single command buffer per frame when possible</text>

  <!-- Legend -->
  <rect x="820" y="300" width="340" height="120" rx="8" fill="#eef2ff" stroke="#6b46c1" stroke-width="1.5"/>
  <text x="835" y="326" class="title" style="fill:#3c366b">Legend</text>
  <text x="835" y="350" class="muted">Boxes: components / managers</text>
  <text x="835" y="370" class="muted">Small boxes: data containers / nodes</text>
  <text x="835" y="390" class="muted">Arrow: data/control flow</text>

  <!-- Source note -->
  <text x="20" y="800" class="muted">Diagram generated from Render Architecture Design (passes, pipelines, views, resources).</text>
</svg>
