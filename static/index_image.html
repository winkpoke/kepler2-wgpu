<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>三维重建 Demo</title>
  <style>
    :root {
      --gap: 12px
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
      margin: 0;
      background: #0b1020;
      color: #e8ecf1
    }

    header {
      padding: 16px 20px;
      background: #0f162f;
      border-bottom: 1px solid #1c2447
    }

    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: .2px
    }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: var(--gap);
      padding: var(--gap)
    }

    .card {
      background: #0f162f;
      border: 1px solid #1c2447;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .25)
    }

    .card h2 {
      font-size: 14px;
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid #1c2447;
      color: #b9c6ff
    }

    .card .content {
      padding: 14px
    }

    input[type="file"] {
      width: 100%
    }

    label {
      display: block;
      margin: 8px 0 6px;
      color: #9fb3ff
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .muted {
      color: #93a1be;
      font-size: 12px
    }

    button {
      background: #5b74ff;
      border: 1px solid #6b82ff;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .tree {
      max-height: 260px;
      overflow: auto;
      padding: 8px 12px
    }

    ul {
      list-style: none;
      padding-left: 16px
    }

    li {
      padding: 2px 0
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #2a3569;
      background: #111941;
      color: #b8c2ff;
      margin-left: 6px
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px
    }

    .mono {
      font-family: ui-monospace, Consolas, Menlo, monospace
    }

    .ok {
      color: #80ffa8
    }

    .warn {
      color: #ffd27a
    }

    progress {
      width: 100%
    }

    .kv {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 10px
    }

    .scroll {
      max-height: 200px;
      overflow: auto
    }

    .small {
      font-size: 12px
    }

    .pill {
      padding: 2px 8px;
      border-radius: 8px;
      background: #17214a;
      border: 1px solid #2a3569
    }

    canvas {
      background-color: black;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>

<body>
  <header>
    <h1>三维重建</h1>
  </header>
  <main>
    <section class="card">
      <h2>1) 选择文件</h2>
      <div class="content">
        <label>输入DICOM文件：</label>
        <input id="file" type="file" multiple accept=".dcm" />
        <label>输入二维投影文件夹：</label>
        <input id="FilesInput" type="file" multiple accept=".raw,.mhd,.dat" />
        <label>输入重建文件：</label>
        <input id="mhxInput" type="file" multiple accept=".mha,.mhd" />
        <div class="row" style="margin-top:8px">
          <button id="btn">运行重建</button>
          <button id="analyzeBtn">分析文件</button>
          <button id="rerender">视图显示</button>
        </div>
      <label for="index-input">操作视图窗口:</label>
      <input type="number" id="index-input" step="1.0" value="0.0">
      <div>
        <label for="slice-input">slice:</label>
        <input type="number" id="slice-input" step="0.5" value="0.0">
        <button id="slice-submit">Submit</button>
      </div>
      <div>
        <label for="scale-input">Scale:</label>
        <input type="number" id="scale-input" step="10.0" value="1.0">
        <button id="scale-submit">Submit</button>
      </div>
      <div>
        <label for="translate-input">translate:</label>
        <label for="trans-x">x:</label> <input type="number" id="trans-x" step="10.0" value="0.0" placeholder="x">
        <label for="trans-y">y:</label><input type="number" id="trans-y" step="10.0" value="0.0" placeholder="y">
        <label for="trans-z">z:</label><input type="number" id="trans-z" step="10.0" value="0.0" placeholder="z">
        <button id="trans-submit">Submit</button>
      </div>
      <div>
        <label for="window">window width:</label><input type="number" id="window" step="10.0" value="0.0">
        <label for="level">window level:</label><input type="number" id="level" step="10.0" value="0.0">
        <button id="winlev-submit">Submit</button>
      </div>
      <div>
        <label for="resize-input">resize:</label>
        <label for="width">width:</label><input type="number" id="width" step="10.0" value="0.0" placeholder="800">
        <label for="height">height:</label><input type="number" id="height" step="10.0" value="0.0" placeholder="800">
        <button id="resize-submit">Submit</button>
      </div>
      </div>
    </section>

    <section class="card">
      <h2>2) 解析结果 </h2>
      <div class="content">
        <div class="kv small">
          <div>Patient Position：</div>
          <div id="PatientPosition" class="pill">未提供</div>
          <div>Image Series：</div>
          <div id="ImageSeries" class="pill">未提供</div>
          <div>检测到的重建文件：</div>
          <div id="mhxName" class="pill">未提供</div>
          <div>体素维度 DimSize：</div>
          <div id="dimSize">—</div>
          <div>体素间距 Spacing：</div>
          <div id="spacing">—</div>
          <div>像素类型：</div>
          <div id="elemType">—</div>
          <button id="convertBtn">导出</button>
          <select id="exportOptions" style="width: 400px">
            <option value="dicom">导出当前序列DICOM</option>
            <option value="mhx">导出重建文件</option>
            <option value="png">导出当前选择的图像PNG</option>
            <option value="pnglist">导出当前序列PNG</option>
          </select>
        </div>
        <div class="scroll">
          <h3 class="small">日志</h3>
          <pre id="log" class="small"></pre>
        </div>
        <div style="margin-top:8px">
          <progress id="progress" max="100" value="0"></progress>
        </div>
        <div id="tree-container"></div>
        <div id="wasm-example"></div>
        <div id="render_app"></div>
      </div>
    </section>
  </main>
  <script type="module">
    // ========= 日志函数 =========
    const log = (msg, level = "info") => {
      const el = document.getElementById("log");
      const prefix = level === "error" ? "❌ " : level === "ok" ? "✅ " : "";
      el.textContent += prefix + msg + "\n";
      el.scrollTop = el.scrollHeight;
    };

    // ========= 快捷选择器 =========
    const byId = (id) => document.getElementById(id);

    // ========= 状态管理 =========
    var repo;
    const state = {
      files: [],
      dat:null,
      mhd: null,
      raws: [],
      mhx: null,
      wasmModule: null,
      len: null,
      render_app: null,
    };

    let gl_canvas = null;
    let series_id;
    let fileLists = [];
    let flag = true;
    let scaleValue = 0.1;
    let volume;

    // ========= 确保WASM模块加载 =========
    async function ensureWasm() {
      if (!state.wasmModule) {
        log("加载WASM模块...");
        state.wasmModule = await import('/pkg/kepler_wgpu.js');
        await state.wasmModule.default(); // 初始化WASM

        console.log("WASM模块导出的函数:", Object.keys(state.wasmModule).filter(key => 
          typeof state.wasmModule[key] === 'function' && key !== 'default'
        ));
        log("WASM模块加载完成", "ok");
      }
      return state.wasmModule;
    }

    function toUint8Array(obj) {
        const json = JSON.stringify(obj);
        const enc = new TextEncoder();
        return enc.encode(json);
    }
    const info = {
      kv: 100.0,
      mAs: 70.0,
      slope: 1612.903,
      intercept: - 1016.129,
    }
    const infoUint8 = toUint8Array(info);
    
    // ========= 文件选择处理 =========
    byId("mhxInput").addEventListener("change", async (e) => {
      state.files = Array.from(e.target.files);
      state.mhx = state.files.find((f) => /\.mha$/i.test(f.name)) || state.files.find((f) => /\.mhd$/i.test(f.name)) || null;
      
      byId("analyzeBtn").disabled = !state.mhx;
      log(state.mhx ? "重建文件已选择，可以解析" : "请选择重建文件");
    });

    document.querySelector('#file').addEventListener('change', async () => {
      const dcms = document.querySelector('input[type="file"]').files;
      fileLists = fileLists ? [...fileLists, ...Array.from(dcms)] : Array.from(dcms);
      let patient_list = await get_tree(fileLists);
      let ul = createTree(patient_list);
      const treeContainer = byId('tree-container');
      treeContainer.innerHTML = ''; // 清空之前的内容
      treeContainer.appendChild(createTree(patient_list));
    })

    byId("FilesInput").addEventListener("change", (e) => {
      const newFiles = Array.from(e.target.files);
      state.files = state.files || [];
      state.files.push(...newFiles);

      const newMhd = newFiles.find((f) => /\.mhd$/i.test(f.name));
      if (newMhd) state.mhd = newMhd;

      const newRaws = newFiles.filter((f) => /\.raw$/i.test(f.name));
      state.raws = state.raws || [];
      state.raws.push(...newRaws);

      const newDat = newFiles.find((f) => /\.dat$/i.test(f.name));
      if (newDat) state.dat = newDat;
    });

    byId("btn").addEventListener("click", async () => {
      try {
        let res = await fetch("http://127.0.0.1:3000/api/run-recon", { method: "POST" });
        console.log("HTTP 状态:", res.status);
        let text = await res.text();
        console.log("收到原始响应:", text);
        log("重建完成！", "ok");
      } catch (err) {
        console.error(err);
        log( "重建失败：" + err.message, "error");
      }
    });

    // ========= 按钮选择处理 =========
    byId('rerender').addEventListener('click', async () => {
      log("开始渲染！")
      if (!state.mhx) {
          alert('请先选择重建文件！');
      }

      await ensureWasm();
      volume = await state.wasmModule.parse_common_files_wasm(state.files, infoUint8);
      if (state.render_app == null){
        state.render_app = await state.wasmModule.get_render_app();
        gl_canvas = state.render_app.get_glcanvas();
        gl_canvas.load_data_from_ct_volume(volume);
        gl_canvas = state.render_app.get_glcanvas();
        state.render_app.run();
      }
      else{
        console.log('render_app:', state.render_app);
        gl_canvas.set_window_by_div_id('render_app', volume);
      }
    })

    // 切层
    byId('slice-submit').addEventListener('click', () => {
      const sliceValue = byId('slice-input').value;
      const input_index = byId('index-input');

      const indexValue = parseInt(input_index.value);
      if (isNaN(sliceValue)) {
          alert('Please enter a valid number');
          return;
      }
      if (!gl_canvas) {
          alert('Please select a series first!');
          return;
      }
      gl_canvas.set_slice_mm(indexValue, sliceValue);
    })

    byId('resize-submit').addEventListener('click', () => {
      const width = byId('width').value;
      const height = byId('height').value;
      const input_index = byId('index-input');
      if (isNaN(width) || isNaN(height)) {
        alert('Please enter a valid number');
        return;
      }
      if (!gl_canvas) {
        alert('Please select a series first!');
        return;
      }
      gl_canvas.resize( width, height);
    })

    byId('scale-submit').addEventListener('click', () => {
        const input = byId('scale-input');
        scaleValue = parseFloat(input.value);
        const input_index = byId('index-input');
        const indexValue = parseInt(input_index.value);
        if (isNaN(scaleValue)) {
          alert('Please enter a valid number');
          return;
        }
        if (!gl_canvas) {
          alert('Please select a series first!');
          return;
        }
        gl_canvas.set_scale(indexValue, scaleValue);
    });

    byId('trans-submit').addEventListener('click', () => {
      let x = document.querySelector('#trans-x').value;
      let y = document.querySelector('#trans-y').value;
      let z = document.querySelector('#trans-z').value;
      const input_index = byId('index-input');
      const indexValue = parseInt(input_index.value);
      console.log('translate:', x, y, z);
      if (isNaN(x) && isNaN(y) && isNaN(z)) {
        alert('Please enter a valid number');
        return;
      }
      if (!gl_canvas) {
        alert('Please select a series first!');
        return;
      }
      gl_canvas.set_translate_in_screen_coord(indexValue, x, y, z);
    });

    byId('winlev-submit').addEventListener('click', () => {
      const win = byId('window').value;
      let lev = byId('level').value;
      const input_index = byId('index-input');
      const indexValue = parseInt(input_index.value);

      if (!gl_canvas) {
        alert('Please select a series first!');
        return;
      }
        win && gl_canvas.set_window_width(indexValue, win);
        lev && gl_canvas.set_window_level(indexValue, lev);
    });

    // ========= MHX文件解析函数 =========
    async function parseMHXContent(mhxText) {
      const lines = mhxText.split('\n');
      const header = {
        element_type: 'MET_FLOAT',
        dim_x: 0,
        dim_y: 0,
        dim_z: 0,
        spacing_x: 0,
        spacing_y: 0,
        spacing_z: 0
      };

      // 解析MHX文件内容
      for (const line of lines) {
        if (!line.trim() || line.startsWith('#')) continue;

        const [key, value] = line.split('=').map(s => s.trim());
        if (!key || !value) continue;

        switch (key) {
          case 'ElementType':
            header.element_type = value;
            break;
          case 'DimSize':
            const dims = value.split(' ').map(Number);
            [header.dim_x, header.dim_y, header.dim_z] = dims;
            state.len = header.dim_x * header.dim_y * header.dim_z;
            break;
          case 'ElementSpacing':
            const spacing = value.split(' ').map(Number);
            [header.spacing_x, header.spacing_y, header.spacing_z] = spacing;
            break;
          case 'ElementDataFile':
            header.data_file = value;
            break;
        }
      }

      return header;
    }

    // ========= 解析按钮点击事件 =========
    byId("analyzeBtn").addEventListener("click", async () => {
      try {
        // 确保WASM加载
        await ensureWasm();
        byId("progress").value = 0;

        // 读取MHX文件内容
        const mhxText = await state.mhx.text();
        log(`读取MHX文件: ${state.mhx.name}`);

        // 解析MHX头信息
        const header = await parseMHXContent(mhxText);
        byId("progress").value = 30;

        // 更新UI显示解析结果
        byId("mhxName").textContent = state.mhx?.name || "—";
        byId("elemType").textContent = header.element_type;
        state.dim = [header.dim_x, header.dim_y,header.dim_z];
        byId("dimSize").textContent = `${header.dim_x} × ${header.dim_y} × ${header.dim_z}`;
        byId("spacing").textContent = `${header.spacing_x.toFixed(2)}, ${header.spacing_y.toFixed(2)}, ${header.spacing_z.toFixed(2)}`;

        log("重建文件解析完成。", "ok");
        byId("progress").value = 100;

      } catch (err) {
        log("解析失败：" + err.message, "error");
        console.error(err);
      }
    });

    function downloadBlob(blob, filename) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }
    // ========= 转换并导出 =========
    byId("convertBtn").addEventListener("click", async () => {
      const option = document.getElementById("exportOptions").value;
      log("你选择了导出："+option);
      try {
        await ensureWasm();
        log("生成 CT 体数据 ...");

        if (!state.wasmModule.build_ct_dicom_wasm) {
          log("build_ct_dicom_wasm 函数未在 WASM 模块中导出");
        }
        else{
          log("build_ct_dicom_wasm 函数已在 WASM 模块中导出");
        }
        byId("progress").value = 25;

        const mhxFile = state.mhx;

        const sop_uid = "1.2.392.200036.9116.2.5.1.144.3437232930.1426478676.365119";
        // 构造 patient / study 对象
        const patient = {
          patient_id: "P001",
          name: "zhangsan",
          birthdate: "19800101",
          sex: "M"
        };
        const study = {
          study_id: "STUDY001",
          patient_id: "P001",
          date: "20250908",
          description: "zhutiCT"
        };

        function toUint8Array(obj) {
          const json = JSON.stringify(obj);
          const enc = new TextEncoder();
          return enc.encode(json);
        }

        const patientUint8 = toUint8Array(patient);
        const studyUint8 = toUint8Array(study);
        if (!mhxFile) {
          log("未找到 MHX 文件");
        }
        else{
          log("已找到 MHX 文件");
        }
        byId("progress").value = 50;

        const arrayBuffer = await mhxFile.arrayBuffer();
        const mhxUint8Array = new Uint8Array(arrayBuffer);
        log(`ArrayBuffer大小: ${arrayBuffer.byteLength} bytes`);
        log(`Uint8Array长度: ${mhxUint8Array.length}`);
        log("开始DICOM转换...");
        byId("progress").value = 75;

        // ========= 分支逻辑 =========
        switch (option) {
          case "dicom":
            log("开始 DICOM 转换...");
            byId("progress").value = 75;

            const files = await state.wasmModule.build_ct_dicom_wasm(
              mhxUint8Array,
              patientUint8,
              studyUint8,
              infoUint8
            );

            const zip = new JSZip(); 
            files.forEach(file => { 
              const arr = new Uint8Array(file.data); 
              zip.file(file.filename, arr); 
            }); 
            
            const blob = await zip.generateAsync({ type: "blob" });
            downloadBlob(blob, "dicoms.zip");

            log("✅ DICOM 导出成功！");
            break;

          case "mhx":
            log("开始导出 MHX ...");
            downloadBlob(new Blob([mhxUint8Array]), "CT_volume.mhx");
            log("✅ MHX 导出成功！");
            break;

          case "png":
            log("开始导出 PNG ...");
            const sliceIndex = byId('slice-input').value;
            log("当前层数:" + sliceIndex);
            const orientation = byId('index-input').value;
            log("当前方向值: " + orientation);
            const ww = byId('window').value;
            const wc = byId('level').value;

            const pngBytes = await state.wasmModule.export_slice_png(mhxUint8Array, sliceIndex, orientation, ww, wc, info.slope, info.intercept);
            const blob_png = new Blob([pngBytes], { type: "image/png" });
            downloadBlob(blob_png, "dicom.png");
            log("✅ PNG 导出成功！");
            break;
          default:
            log("未知导出选项: " + option);
        }

        byId("progress").value = 100;

      } catch (e) {
        log("导出失败：" + e, "error");
      }
    });

  
    // ========= 显示DICOM =========
    function get_tree(fileArray) {
      return new Promise(async (resolve, reject) => {
        try {
          // 确保WASM加载
          await ensureWasm();
          repo = await state.wasmModule.parse_dcm_files_wasm(fileArray);
          // 获取所有患者信息
          let patients = JSON.parse(repo.get_all_patients());
          let patient_list = [];
          for (const patient of patients) {
            let patient_data = {
              label: patient.name,
              children: []
            };
            // 获取患者的研究（study）
            let studies = JSON.parse(repo.get_studies_by_patient(patient.patient_id));

            for (const study of studies) {
              let study_data = {
                label: study.uid,
                children: []
              };
              // 获取研究的序列（series）
              let series = JSON.parse(repo.get_series_by_study(study.uid));
              for (const serie of series) {
                let serie_data = {
                  label: serie.uid,
                  images: []
                };
                byId("PatientPosition").textContent = serie.patient_position || "—";
                log(`选择患者位置: ${serie.patient_position}`);
                // 获取序列的图像（images）
                let images_id = JSON.parse(repo.get_images_by_series(serie.uid));
                serie_data.images = images_id; // 添加图像数据
                study_data.children.push(serie_data); // 添加序列数据
              }
              patient_data.children.push(study_data); // 添加研究数据
            }
            patient_list.push(patient_data); // 添加患者数据
          }
          resolve(patient_list)
        } catch (error) {
            reject(error);
            console.error("Error parsing DICOM files:", error);
        }
      })
    }

    function createTree(data, isRoot = true) {
      const ul = document.createElement('ul');
      data.forEach(item => {
        const li = document.createElement('li');
        const toggle = document.createElement('span');
        toggle.textContent = item.label;
        toggle.classList.add('toggle');

        const expandIcon = document.createElement('span');
        if (item.children) {
          expandIcon.classList.add('expand-icon');
          expandIcon.innerHTML = '▶'; // 默认使用右箭头
          li.appendChild(expandIcon);
        }
        li.appendChild(toggle);
        isRoot && li.classList.add('series'); // 给最外层 li 添加 class
        // 如果有子节点，则递归创建树
        if (item.children) {
            const childUl = createTree(item.children, false);
            childUl.style.display = 'none'; // 初始隐藏子节点
            li.appendChild(childUl);
            // 添加点击事件来切换显示
            toggle.addEventListener('click', () => {
                const isHidden = childUl.style.display === 'none';
                childUl.style.display = isHidden ? 'block' : 'none';
                expandIcon.innerHTML = isHidden ? '▼' : '▶'; // 更新图标
                if (isHidden) {
                    expandIcon.classList.remove('collapsed');
                } else {
                    expandIcon.classList.add('collapsed');
                }
            });
        } else {
            toggle.addEventListener('click', async () => {
                series_id = toggle.innerHTML;
                byId("ImageSeries").textContent = series_id;
                log(`选择序列: ${series_id}`);
                let vol = repo.generate_ct_volume(series_id);
                volume = vol;
                if (flag == true) {
                  if (state.render_app == null) {
                    state.render_app = await state.wasmModule.get_render_app();
                    gl_canvas = state.render_app.get_glcanvas();
                    gl_canvas.load_data_from_ct_volume(volume);
                    gl_canvas = state.render_app.get_glcanvas();
                    state.render_app.run();
                  } else {
                    console.log('render_app:', state.render_app);
                    gl_canvas.set_window_by_div_id('render_app', volume);
                    console.log(vol);
                  }
                  flag = false;
                } else {
                  gl_canvas.load_data_from_ct_volume(volume);
                }

            })
        }

        ul.appendChild(li);
      });
      return ul;
    }
  </script>
</body>
